version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: axebch2-app
      APP_PORT: 3000
      JWT_SECRET: "${JWT_SECRET}"
    networks:
      - umbrel_main_network

  init:
    image: alpine:3.22.1
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_DATA_DIR}:/appdata
    command:
      - /bin/sh
      - -ec
      - |-
        set -eu

        mkdir -p /data/node /data/pool/config /data/pool/www/pool /data/pool/www/users /data/ui/state

        touch /appdata/settings.yml
        chown 1000:1000 /appdata/settings.yml || true
        chown -R 1000:1000 /data || true

        if [ -n "${JWT_SECRET:-}" ]; then
          envfile="/appdata/.env"
          tmp="/appdata/.env.tmp"
          if [ -f "$$envfile" ]; then
            grep -v '^JWT_SECRET=' "$$envfile" > "$$tmp" || true
          else
            : > "$$tmp"
          fi
          printf "JWT_SECRET=%s\n" "${JWT_SECRET}" >> "$$tmp"
          chmod 600 "$$tmp" || true
          chown 1000:1000 "$$tmp" || true
          mv "$$tmp" "$$envfile"
        fi

  bch2:
    image: ghcr.io/willitmod/axebch2-node:0.1.22-dev
    restart: unless-stopped
    stop_grace_period: 15m30s
    depends_on:
      init:
        condition: service_completed_successfully
    environment:
      NETWORK: "mainnet"
      RPC_USER: "bch2"
      RPC_PASSWORD: "${APP_PASSWORD}"
      RPC_PORT: "8342"
      P2P_PORT: "8339"
      EXTERNAL_IP: "${NETWORK_IP}"
      FORCE_IPV4_BIND: "1"
      PRUNE: "0"
      RPC_THREADS: "4"
      MAX_MEMPOOL: "64"
      DB_CACHE: "256"
      TX_INDEX: "0"
      BOOTSTRAP_CONNECTNODES: ""
      PEER_WATCHDOG_INTERVAL: "30"
      PEER_WATCHDOG_MIN_CONNECTIONS: "1"
    ports:
      - "8339:8339/tcp"
    volumes:
      - ${APP_DATA_DIR}/data/node:/data/node
    healthcheck:
      test: ["CMD-SHELL", "bitcoincashII-cli -datadir=/data/node -rpcuser=\"$$RPC_USER\" -rpcpassword=\"$$RPC_PASSWORD\" getblockchaininfo >/dev/null 2>&1"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 2m

  ckpool:
    image: ghcr.io/willitmod/axebch2-ckpool:0.1.22-dev
    user: "1000:1000"
    restart: on-failure
    depends_on:
      - bch2
      - init
    stop_grace_period: 30s
    command: ["-L", "-c", "/data/pool/config/ckpool.conf"]
    environment:
      BCH2_RPC_HOST: "bch2"
      BCH2_RPC_PORT: "8342"
      BCH2_RPC_USER: "bch2"
      BCH2_RPC_PASSWORD: "${APP_PASSWORD}"
      BCH2_ZMQ_HASHBLOCK_PORT: "28342"
      PAYOUT_ADDRESS: "CHANGEME_BCH_PAYOUT_ADDRESS"
      MINDIFF: "1"
      STARTDIFF: "16"
      MAXDIFF: "0"
    ports:
      - "9265:3333/tcp"
    volumes:
      - ${APP_DATA_DIR}/data/pool:/data/pool
    healthcheck:
      test: ["CMD-SHELL", "pid=$$(cat /tmp/ckpool/main.pid 2>/dev/null || true); [ -n \"$$pid\" ] && kill -0 \"$$pid\" 2>/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 45s

  app:
    image: ghcr.io/willitmod/axebch2-app:0.1.22-dev
    user: "1000:1000"
    restart: on-failure
    depends_on:
      - bch2
      - ckpool
      - init
    networks:
      default:
        aliases:
          - axebch2-app
      umbrel_main_network:
        aliases:
          - axebch2-app
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      NETWORK_IP: "${NETWORK_IP}"
      STATIC_DIR: "/app/static"
      APP_CHANNEL: "DEV"
      APP_VERSION_SUFFIX: "-dev"
      BCH2_NODE_IMAGE: "ghcr.io/willitmod/axebch2-node:0.1.22-dev"
      CKPOOL_IMAGE: "ghcr.io/willitmod/axebch2-ckpool:0.1.22-dev"
      BCH2_RPC_HOST: "bch2"
      BCH2_RPC_PORT: "8342"
      BCH2_RPC_USER: "bch2"
      BCH2_RPC_PASS: "${APP_PASSWORD}"
      CKPOOL_STATUS_DIR: "/data/pool/www/pool"
      CKPOOL_USERS_DIR: "/data/pool/www/users"
      CKPOOL_LOG_PATH: "/data/pool/www/ckpool.log"
      CKPOOL_CONF_PATH: "/data/pool/config/ckpool.conf"

networks:
  umbrel_main_network:
    external: true
    name: umbrel_main_network
