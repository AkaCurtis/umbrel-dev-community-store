version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: axebch2-app
      APP_PORT: 3000
      JWT_SECRET: "${JWT_SECRET}"
    networks:
      - umbrel_main_network

  init:
    image: alpine:3.22.1
    restart: "no"
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_DATA_DIR}:/appdata
      - ${APP_DATA_DIR}/data/templates:/data/templates:rw
    environment:
      APPS_SUBNET: "${NETWORK_IP}/16"
      RPC_USER: "bch2"
      RPC_PASSWORD: "${APP_PASSWORD}"
      BCH2_RPC_PORT: "8342"
      BCH2_P2P_PORT: "8339"
      BCH2_ZMQ_HASHBLOCK_PORT: "28342"
      PAYOUT_ADDRESS: "CHANGEME_BCH_PAYOUT_ADDRESS"
    command:
      - /bin/sh
      - -ec
      - |-
        set -eu

        apk add --no-cache envsubst jq >/dev/null

        # Persist JWT secret into ${APP_DATA_DIR}/.env so that SSH restarts
        # (without exports.sh) don't boot app_proxy with an empty JWT_SECRET.
        if [ -n "${JWT_SECRET:-}" ]; then
          envfile="/appdata/.env"
          tmp="/appdata/.env.tmp"
          if [ -f "$$envfile" ]; then
            grep -v '^JWT_SECRET=' "$$envfile" > "$$tmp" || true
          else
            : > "$$tmp"
          fi
          printf "JWT_SECRET=%s\n" "${JWT_SECRET}" >> "$$tmp"
          chmod 600 "$$tmp" || true
          chown 1000:1000 "$$tmp" || true
          mv "$$tmp" "$$envfile"
        fi

        mkdir -p /data/ui/state /data/node /data/pool/config /data/pool/www/pool /data/pool/www/users

        # The host may create settings.yml as root during update/install; ensure it stays writable.
        touch /appdata/settings.yml
        chown 1000:1000 /appdata/settings.yml || true

        # Create bitcoinII.conf if it doesn't exist
        if [ ! -f /data/node/bitcoinII.conf ]; then
          if [ -f /data/templates/bitcoinII.conf.template ]; then
            envsubst < /data/templates/bitcoinII.conf.template > /data/node/bitcoinII.conf
          else
            # Fallback: create config inline if template file doesn't exist
            printf '%s\n' \
              'server=1' \
              'txindex=0' \
              '' \
              "rpcuser=${RPC_USER}" \
              "rpcpassword=${RPC_PASSWORD}" \
              "rpcport=${BCH2_RPC_PORT}" \
              'rpcbind=0.0.0.0' \
              'rpcallowip=127.0.0.1/32' \
              "rpcallowip=${APPS_SUBNET}" \
              'rpcallowip=10.0.0.0/8' \
              'rpcallowip=172.16.0.0/12' \
              'rpcallowip=192.168.0.0/16' \
              '' \
              '# ZMQ (ckpool block notifications)' \
              "zmqpubhashblock=tcp://0.0.0.0:${BCH2_ZMQ_HASHBLOCK_PORT}" \
              '' \
              '# Network' \
              "port=${BCH2_P2P_PORT}" \
              'listen=1' \
              'upnp=1' \
              '' \
              '# Pruning (optional): keep only a rolling tail of recent blocks to reduce retained history.' \
              'prune=550' \
              > /data/node/bitcoinII.conf
          fi
        fi
        # Always ensure proper ownership on the config file
        chown -R 1000:1000 /data/node || true
        chmod -R ug+rw /data/node || true

        needs_ckpool_regen=0
        if [ -f /data/pool/config/ckpool.conf ]; then
          if ! grep -qE '"btcd"[[:space:]]*:[[:space:]]*\[' /data/pool/config/ckpool.conf; then
            needs_ckpool_regen=1
          fi
          if ! grep -q '"zmqblock"' /data/pool/config/ckpool.conf; then
            needs_ckpool_regen=1
          fi
        else
          needs_ckpool_regen=1
        fi

        if [ "$$needs_ckpool_regen" -eq 1 ]; then
          existing_addr="$$(grep -oE '\"btcaddress\"[[:space:]]*:[[:space:]]*\"[^\"]*\"' /data/pool/config/ckpool.conf 2>/dev/null | head -n 1 | sed -E 's/.*\"btcaddress\"[[:space:]]*:[[:space:]]*\"([^\"]*)\".*/\1/' || true)"
          if [ -f /data/pool/config/ckpool.conf ]; then
            mv /data/pool/config/ckpool.conf "/data/pool/config/ckpool.conf.bak.$$(date +%s 2>/dev/null || echo 0)" || true
          fi
          
          if [ -f /data/templates/ckpool.conf.template ]; then
            envsubst < /data/templates/ckpool.conf.template > /data/pool/config/ckpool.conf
          else
            # Fallback: create config inline if template file doesn't exist
            printf '%s\n' \
              '{' \
              '  "btcd": [' \
              '    {' \
              "      \"url\": \"bch2:${BCH2_RPC_PORT}\"," \
              "      \"auth\": \"${RPC_USER}\"," \
              "      \"pass\": \"${RPC_PASSWORD}\"," \
              '      "notify": true' \
              '    }' \
              '  ],' \
              "  \"btcaddress\": \"${PAYOUT_ADDRESS}\"," \
              '  "btcsig": "/AxeBCH2/",' \
              '  "mindiff": 1,' \
              '  "startdiff": 1,' \
              '  "maxdiff": 0,' \
              '  "logdir": "/www",' \
              '  "webdir": "/www/pool",' \
              '  "userdir": "/www/users",' \
              "  \"zmqblock\": \"tcp://bch2:${BCH2_ZMQ_HASHBLOCK_PORT}\"" \
              '}' \
              > /data/pool/config/ckpool.conf
          fi
          
          if [ -n "$$existing_addr" ] && [ "$$existing_addr" != "CHANGEME_BCH_PAYOUT_ADDRESS" ]; then
            tmp="$$(mktemp)"
            if jq --arg a "$$existing_addr" '.btcaddress=$$a' /data/pool/config/ckpool.conf > "$$tmp" 2>/dev/null; then
              mv "$$tmp" /data/pool/config/ckpool.conf
            else
              rm -f "$$tmp" || true
            fi
          fi
          chown -R 1000:1000 /data/pool || true
        fi

        if [ ! -f /data/pool/config/ckpool.args ]; then
          echo "-B" > /data/pool/config/ckpool.args
          chown 1000:1000 /data/pool/config/ckpool.args || true
        fi

        # Apply saved UI settings (if present) to ckpool.conf so payouts go to the configured address.
        if [ -f /data/ui/state/pool_settings.json ]; then
          addr="$$(jq -r '.payoutAddress // empty' /data/ui/state/pool_settings.json 2>/dev/null || true)"
          if [ -n "$$addr" ] && [ -f /data/pool/config/ckpool.conf ]; then
            tmp="$$(mktemp)"
            if jq --arg a "$$addr" '.btcaddress=$$a' /data/pool/config/ckpool.conf > "$$tmp" 2>/dev/null; then
              mv "$$tmp" /data/pool/config/ckpool.conf
            fi
          fi
        fi

        chmod -R ug+rwX /data/ui /data/node /data/pool || true
        chown -R 1000:1000 /data/ui /data/node /data/pool || true

  app:
    image: ghcr.io/willitmod/axebch2-app:0.1.29-dev
    user: "1000:1000"
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
      bch2:
        condition: service_started
    networks:
      default:
        aliases:
          - axebch2-app
      umbrel_main_network:
        aliases:
          - axebch2-app
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      APP_VERSION: "0.1.29"
      APP_CHANNEL: "DEV"
      NETWORK_IP: "${NETWORK_IP}"
      BCH2_NODE_IMAGE: "ghcr.io/willitmod/axebch2-node:0.1.29-dev"
      CKPOOL_IMAGE: "ghcr.io/willitmod/axebch2-ckpool:0.1.29-dev"
      BCH2_RPC_HOST: "bch2"
      BCH2_RPC_PORT: "8342"
      BCH2_RPC_USER: "bch2"
      BCH2_RPC_PASS: "${APP_PASSWORD}"
      CKPOOL_STRATUM_HOST: "ckpool"
      CKPOOL_STRATUM_PORT: "3333"
    healthcheck:
      test:
        - CMD-SHELL
        - python -c "import sys, urllib.request; r=urllib.request.urlopen('http://127.0.0.1:3000/api/about', timeout=3); sys.exit(0 if r.status == 200 else 1)"
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s

  bch2:
    image: ghcr.io/willitmod/axebch2-node:0.1.29-dev
    restart: unless-stopped
    stop_grace_period: 15m30s
    depends_on:
      init:
        condition: service_completed_successfully
    environment:
      NETWORK: "mainnet"
      RPC_USER: "bch2"
      RPC_PASSWORD: "${APP_PASSWORD}"
      RPC_PORT: "8342"
      P2P_PORT: "8339"
      EXTERNAL_IP: "${NETWORK_IP}"
      FORCE_IPV4_BIND: "1"
      PRUNE: "0"
      RPC_THREADS: "4"
      MAX_MEMPOOL: "64"
      DB_CACHE: "256"
      TX_INDEX: "0"
      BOOTSTRAP_CONNECTNODES: ""
      PEER_WATCHDOG_INTERVAL: "30"
      PEER_WATCHDOG_MIN_CONNECTIONS: "1"
      ONE_TIME_REINDEX_KEY: "bitcoincashii-v27.0.2"
      ONE_TIME_REINDEX_REQUIRE_EXISTING_DATA: "1"
    volumes:
      - ${APP_DATA_DIR}/data/node:/data/node
    ports:
      - "8339:8339/tcp"
    healthcheck:
      test:
        - CMD-SHELL
        - bitcoincashII-cli -datadir=/data/node -rpcuser="$$RPC_USER" -rpcpassword="$$RPC_PASSWORD" getblockchaininfo >/dev/null 2>&1
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 2m

  ckpool:
    image: ghcr.io/willitmod/axebch2-ckpool:0.1.29-dev
    restart: unless-stopped
    stop_grace_period: 30s
    depends_on:
      init:
        condition: service_completed_successfully
      bch2:
        condition: service_started
    environment:
      BCH2_RPC_HOST: "bch2"
      BCH2_RPC_PORT: "8342"
      BCH2_RPC_USER: "bch2"
      BCH2_RPC_PASSWORD: "${APP_PASSWORD}"
      BCH2_ZMQ_HASHBLOCK_PORT: "28342"
      PAYOUT_ADDRESS: "CHANGEME_BCH_PAYOUT_ADDRESS"
      MINDIFF: "1"
      STARTDIFF: "16"
      MAXDIFF: "0"
    user: "1000:1000"
    command: ["-k", "-L", "-c", "/data/pool/config/ckpool.conf"]
    ports:
      - "9265:3333/tcp"
    volumes:
      - ${APP_DATA_DIR}/data/pool:/data/pool
    healthcheck:
      test:
        - CMD-SHELL
        - 'pid=$$(cat /tmp/ckpool/main.pid 2>/dev/null || true); [ -n "$$pid" ] && kill -0 "$$pid" 2>/dev/null'
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 45s

networks:
  umbrel_main_network:
    external: true
    name: umbrel_main_network
