version: "3.7"

services:
  app_proxy:
    environment:
      APP_HOST: powpow-app
      APP_PORT: 3000
      JWT_SECRET: "${JWT_SECRET}"
    networks:
      - umbrel_main_network

  init:
    image: alpine:3.22.1
    restart: "no"
    volumes:
      - ${APP_DATA_DIR}/data:/data
      - ${APP_DATA_DIR}:/appdata
    command:
      - /bin/sh
      - -ec
      - |-
        set -eu

        # Persist JWT secret into ${APP_DATA_DIR}/.env so that SSH restarts
        # (without exports.sh) don't boot app_proxy with an empty JWT_SECRET.
        if [ -n "${JWT_SECRET:-}" ]; then
          envfile="/appdata/.env"
          tmp="/appdata/.env.tmp"
          if [ -f "$$envfile" ]; then
            grep -v '^JWT_SECRET=' "$$envfile" > "$$tmp" || true
          else
            : > "$$tmp"
          fi
          printf "JWT_SECRET=%s\n" "${JWT_SECRET}" >> "$$tmp"
          chmod 600 "$$tmp" || true
          chown 1000:1000 "$$tmp" || true
          mv "$$tmp" "$$envfile"
        fi

        mkdir -p /data/ui/state /data/litecoin /data/dogecoin /data/pool/config /data/postgres

        # The host may create settings.yml as root during update/install; ensure it stays writable.
        touch /appdata/settings.yml
        chown 1000:1000 /appdata/settings.yml || true

        # Set permissions for app data directories
        chown -R 1000:1000 /data/ui /data/litecoin /data/dogecoin /data/pool /data/pool/config || true
        chmod -R ug+rwX /data/ui /data/litecoin /data/dogecoin /data/pool || true
        
        # PostgreSQL needs specific ownership and permissions
        chown -R 70:70 /data/postgres || true
        chmod 700 /data/postgres || true

  app:
    image: ghcr.io/willitmod/powpow-app:0.2.13-dev
    user: "1000:1000"
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
    networks:
      default:
        aliases:
          - powpow-app
      umbrel_main_network:
        aliases:
          - powpow-app
    volumes:
      - ${APP_DATA_DIR}/data:/data
    environment:
      APP_VERSION: "0.2.13"
      APP_CHANNEL: "DEV"
      NETWORK_HOST_HINT: "${NETWORK_IP}"
      POOL_API_URL: "http://pool:8001"
      POSTGRES_PASSWORD: "${APP_PASSWORD}"
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import sys, urllib.request; r=urllib.request.urlopen('http://127.0.0.1:3000/api/about', timeout=3); sys.exit(0 if r.status == 200 else 1)\""]
      interval: 15s
      timeout: 5s
      retries: 20
      start_period: 90s

  litecoin:
    image: ghcr.io/willitmod/powpow-litecoin:0.2.10-dev
    user: "1000:1000"
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - ${APP_DATA_DIR}/data:/data
    healthcheck:
      test: ["CMD-SHELL", "pid=$$(cat /data/litecoin/litecoind.pid 2>/dev/null || true); [ -n \"$$pid\" ] && kill -0 \"$$pid\" 2>/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 3m

  dogecoin:
    image: ghcr.io/willitmod/powpow-dogecoin:0.2.10-dev
    user: "1000:1000"
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
    volumes:
      - ${APP_DATA_DIR}/data:/data
    healthcheck:
      test: ["CMD-SHELL", "pid=$$(cat /data/dogecoin/dogecoind.pid 2>/dev/null || true); [ -n \"$$pid\" ] && kill -0 \"$$pid\" 2>/dev/null"]
      interval: 15s
      timeout: 5s
      retries: 40
      start_period: 3m

  pool:
    image: ghcr.io/willitmod/powpow-pool:0.2.13-dev
    user: "1000:1000"
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
      postgres:
        condition: service_started
      litecoin:
        condition: service_started
      dogecoin:
        condition: service_started
    environment:
      WAIT_FOR_FULL_SYNC: "1"
    ports:
      - "9555:9555/tcp"
    volumes:
      - ${APP_DATA_DIR}/data:/data

  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    depends_on:
      init:
        condition: service_completed_successfully
    environment:
      POSTGRES_USER: "mergedmining"
      POSTGRES_PASSWORD: "${APP_PASSWORD}"
      POSTGRES_DB: "mergedmining"
    volumes:
      - ${APP_DATA_DIR}/data/postgres:/var/lib/postgresql/data
      - ./postgres/init:/docker-entrypoint-initdb.d:ro

networks:
  umbrel_main_network:
    external: true
    name: umbrel_main_network
